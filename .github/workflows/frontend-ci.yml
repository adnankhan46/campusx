name: Frontend Pipeline

on:
  pull_request:
    branches: [ "dev", "main" ]
    paths:
      - 'client/**'

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./client
        
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with: { version: 8 }
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'pnpm', cache-dependency-path: './client/pnpm-lock.yaml' }
      
      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint
      - run: pnpm run build